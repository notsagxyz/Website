<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video</title>

  <!-- Discord / OpenGraph -->
  <meta property="og:type" content="video.other" />
  <meta property="og:title" content="Video" />
  <meta property="og:description" content="Click para ver el video" />
  <meta property="og:image" content="https://img.youtube.com/vi/dQw4w9WgXcQ/maxresdefault.jpg" />

  <!-- Twitter Player (Discord lo usa para el embed) -->
  <meta name="twitter:card" content="player" />
  <meta name="twitter:title" content="Video" />
  <meta name="twitter:description" content="Click para ver el video" />
  <meta name="twitter:player" content="https://www.youtube.com/embed/dQw4w9WgXcQ" />
  <meta name="twitter:player:width" content="1280" />
  <meta name="twitter:player:height" content="720" />
  <meta name="twitter:image" content="https://img.youtube.com/vi/dQw4w9WgXcQ/maxresdefault.jpg" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .container { position: relative; width: 100vw; height: 100vh; }
    iframe { border: 0; position: absolute; top: 0; height: 100%; width: 100%; }
  </style>
</head>
<body>
  <div class="container">
    <iframe
      src="https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
      allowfullscreen>
    </iframe>
  </div>
</body>
</html>
